[tool.ruff]
line-length = 88
target-version = "py311"
src = [".", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["N802"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
addopts = "--cov=app --cov=main --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
source = ["app", "main"]
omit = ["tests/*"]
