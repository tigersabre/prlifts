# Alembic configuration for PRLifts backend.
# The sqlalchemy.url below is a fallback only — it is overridden at runtime
# by the DATABASE_URL environment variable read in migrations/env.py.
# Never commit real credentials here.

[alembic]
script_location = migrations
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .

# Fallback URL — overridden by DATABASE_URL env var in env.py
sqlalchemy.url = postgresql+asyncpg://localhost/prlifts_dev

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
